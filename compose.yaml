services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV}
    env_file:
      - .env
    image: perichat-express
    container_name: perichat-express
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - '${APP_PORT}:${APP_PORT}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    dns:
      - 1.1.1.1
      - 8.8.8.8
  db:
    image: postgres:16-alpine
    container_name: perichat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    container_name: perichat-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  pgsql_data:
  redis_data:
